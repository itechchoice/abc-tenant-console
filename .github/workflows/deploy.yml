name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: ${{ vars.NODE_VERSION }}
  PNPM_VERSION: ${{ vars.PNPM_VERSION }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION != '' && env.PNPM_VERSION || '9' }}
          standalone: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION != '' && env.NODE_VERSION || '20' }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        env:
          VITE_APP_BASE_PATH: ${{ vars.VITE_APP_BASE_PATH != '' && vars.VITE_APP_BASE_PATH || '/tenant-console/' }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL != '' && vars.VITE_API_BASE_URL || '/tenant-console-api' }}
        run: pnpm build

      - name: Validate deployment secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          REMOTE_PATH: ${{ secrets.DEPLOY_REMOTE_PATH }}
        run: |
          if [ -z "$SSH_USER" ] || [ -z "$SSH_HOST" ] || [ -z "$REMOTE_PATH" ] || [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "Missing SSH deployment secrets." >&2
            echo "Required: DEPLOY_SSH_PRIVATE_KEY, DEPLOY_SSH_USER, DEPLOY_SSH_HOST, DEPLOY_REMOTE_PATH." >&2
            exit 1
          fi

      - name: Deploy build artifacts
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          REMOTE_PATH: ${{ secrets.DEPLOY_REMOTE_PATH }}
        run: |
          SSH_PORT=${SSH_PORT:-22}
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts
          rsync -av --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes -p $SSH_PORT" \
            dist/ "$SSH_USER@$SSH_HOST:$REMOTE_PATH/"
